apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-enforcer-debug
  labels:
    app: git-workflow-enforcer
    component: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-workflow-enforcer
      component: debug
  template:
    metadata:
      labels:
        app: git-workflow-enforcer
        component: debug
    spec:
      containers:
      - name: enforcer
        image: git-workflow-enforcer:test
        imagePullPolicy: Never
        
        # Keep container running for debugging
        command:
        - /bin/sh
        - -c
        - |
          echo "Debug container started"
          echo "ConfigMap should be mounted at /app/src/config"
          echo "Listing mounted config:"
          ls -la /app/src/config/ || echo "Config directory not found"
          echo "Sleeping indefinitely for debugging..."
          sleep infinity
        
        volumeMounts:
        - name: config-volume
          mountPath: /app/src/config
          readOnly: true
      
      volumes:
      - name: config-volume
        configMap:
          name: git-enforcer-config
          items:
          - key: rules.json
            path: rules.json
      
      restartPolicy: Always
