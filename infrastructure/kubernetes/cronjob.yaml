apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-workflow-enforcer-cron
  labels:
    app: git-workflow-enforcer
spec:
  schedule: "0 0 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: git-workflow-enforcer
        spec:
          restartPolicy: Never
          containers:
          - name: enforcer
            image: git-workflow-enforcer:test
            imagePullPolicy: IfNotPresent
            command:
            - python
            - -m
            - src.main.cli
            - validate-commit
            - "feat: scheduled validation"
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
