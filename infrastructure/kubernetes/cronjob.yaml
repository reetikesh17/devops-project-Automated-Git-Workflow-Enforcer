apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-workflow-enforcer-cron
  labels:
    app: git-workflow-enforcer
    component: scheduled-validation
spec:
  # Run every day at midnight
  schedule: "0 0 * * *"
  
  # Keep last 3 successful and 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  
  # Concurrency policy
  concurrencyPolicy: Forbid
  
  jobTemplate:
    metadata:
      labels:
        app: git-workflow-enforcer
        component: scheduled-validation
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400  # 24 hours
      
      template:
        metadata:
          labels:
            app: git-workflow-enforcer
            component: scheduled-validation
        spec:
          restartPolicy: OnFailure
          
          containers:
          - name: enforcer
            image: git-workflow-enforcer:latest
            imagePullPolicy: IfNotPresent
            
            command:
            - python
            - src/main/cli.py
            - validate-all
            - --ci
            
            env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NO_COLOR
              value: "1"
            
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
          
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
