apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-workflow-enforcer
  labels:
    app: git-workflow-enforcer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-workflow-enforcer
  template:
    metadata:
      labels:
        app: git-workflow-enforcer
    spec:
      containers:
      - name: enforcer
        image: git-workflow-enforcer:test
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          echo 'Git Workflow Enforcer Running'
          while true; do
            python -m src.main.cli validate-commit 'feat: periodic check'
            sleep 300
          done
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - import sys; sys.exit(0)
          initialDelaySeconds: 10
          periodSeconds: 30
